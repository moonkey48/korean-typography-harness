<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>대시보드 Before / After 비교</title>
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; background: #eef0f4;
    font-family: "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif;
    padding: 56px 64px 64px; -webkit-font-smoothing: antialiased;
  }
  .head { text-align: center; margin-bottom: 40px; }
  .head h1 { font-size: 52px; font-weight: 700; color: #111827; }
  .head p { font-size: 30px; color: #4B5563; margin-top: 14px; }
  .row { display: flex; gap: 40px; align-items: flex-start; }
  .col { flex: 1; min-width: 0; }
  .tag { display: inline-flex; align-items: center; gap: 10px; font-size: 30px; font-weight: 700; margin-bottom: 18px; padding: 8px 20px; border-radius: 999px; }
  .tag.before { background: #FEE2E2; color: #B91C1C; }
  .tag.after  { background: #DCFCE7; color: #047857; }
  .shot { width: 100%; border-radius: 14px; display: block; box-shadow: 0 12px 40px rgba(0,0,0,0.18); border: 1px solid #d7dae2; }
  .cap { font-size: 23px; color: #6B7280; margin-top: 16px; line-height: 1.5; }
  .cap b { color: #374151; font-weight: 600; }
</style>
</head>
<body>
  <div class="head">
    <h1>같은 대시보드 — 규칙만 바꿨습니다</h1>
    <p>마케팅 성과 대시보드 · <b>korean-typography-harness</b> 적용 전후</p>
  </div>
  <div class="row">
    <div class="col">
      <span class="tag before">✕ Before</span>
      <img class="shot" src="before.png" alt="dashboard before" />
      <p class="cap">KPI 숫자 작아 안 띔 · 표 숫자 <b>가운데정렬</b>·세로선 · 차트에 값 라벨 없이 <b>격자선+범례</b> · 촘촘·좁은 행간</p>
    </div>
    <div class="col">
      <span class="tag after">✓ After</span>
      <img class="shot" src="after.png" alt="dashboard after" />
      <p class="cap">KPI <b>대형 수치</b>+화살표 · 표 숫자 <b>우정렬+tabular</b> · 막대 위 <b>직접 라벨</b>(격자선 제거) · 넉넉한 간격</p>
    </div>
  </div>
</body>
</html>
